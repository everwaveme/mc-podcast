<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Color - подкаст о фотографии</title>

  <link rel="icon" type="image/png" href="../images/favicon.png">
  <link rel="stylesheet" href="style/style.css">
</head>

<body>

  <header class="header">
    <div class="header-container">
      <div class="header-wrap">
        <a href="#" class="header-logo">
          Modern Color
        </a>
        <nav class="nav">
          <ul class="nav-menu">
            <li class="nav-menu-item">
              <a href="#" class="nav-menu-link">
                Выпуски
              </a>
            </li>
            <li class="nav-menu-item">
              <a href="#" class="nav-menu-link">
                О подкасте
              </a>
            </li>
            <li class="nav-menu-item">
              <a href="#" class="nav-menu-link">
                Контакты
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </header>

  <main class="main">

    <section class="promo">
      <div class="promo-container">
        <div class="promo-wrap">
          <div class="promo-info">
            <h1 class="promo-info-title">
              Истории о фотографиях, их создателях и духе времени
            </h1>
            <a href="#" class="promo-info-btn">
              <img src="images/play-icon.png" class="promo-info-btn-play">
              <span class="promo-info-btn-text">
                Слушать
              </span>
            </a>
          </div>
          <div class="promo-cover">
            <img src="images/podcast-cover.jpg" alt="Обложка подкаста" class="promo-cover-img">
          </div>
        </div>
      </div>
    </section>

      <section class="platforms">
        <div class="platforms-container">
          <ul class="platforms-list">
            <li class="platform-item">
              <a href="#" class="platforms-link" style="background-image: url('../images/apple-podcasts.png');">
              </a>
            </li>
            <li class="platform-item">
              <a href="#" class="platforms-link" style="background-image: url('../images/yandex-music-icon.png');">
              </a>
            </li>
            <li class="platform-item">
              <a href="#" class="platforms-link" style="background-image: url('../images/google-podcasts-icon.png');">
              </a>
            </li>
            <li class="platform-item">
              <a href="#" class="platforms-link" style="background-image: url('../images/vk-music-icon.png');">
              </a>
            </li>
            <!-- <li class="platform-item">
              <a href="#" class="platforms-link" style="background-image: url('../images/youtube-icon.png');">
              </a>
            </li> -->
          </ul>
        </div>
      </section>



  </main>
  <footer class="footer"></footer>


</body>
</html>
